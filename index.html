<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>📈 AI Stock Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c16; --bg2: #111827; --bg3: #1a2235;
    --border: #1e3a5f; --text: #e0e6f0; --muted: #6b7fa3;
    --green: #00d4a0; --red: #ff4d6d; --blue: #60a0ff;
    --yellow: #f0c040; --purple: #a070ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    padding-bottom: 80px; overflow-x: hidden;
  }

  /* ── STARFIELD BACKGROUND ── */
  #stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle linear infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: 1; transform: scale(1); }
  }

  /* ── SCAN LINE ── */
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none; z-index: 999;
  }

  /* ── GRID GLOW ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(96,160,255,0.07), transparent),
      radial-gradient(ellipse 60% 30% at 20% 80%, rgba(0,212,160,0.05), transparent);
    pointer-events: none; z-index: 0;
  }

  header {
    background: rgba(8,12,22,0.92);
    padding: 16px 16px 0;
    position: sticky; top: 0; z-index: 99;
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(96,160,255,0.15);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }

  /* ── LOGO GLITCH ── */
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 3px; color: var(--blue);
    text-transform: uppercase; margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(96,160,255,0.5);
    animation: glitch 8s infinite;
    position: relative;
  }
  @keyframes glitch {
    0%,94%,100% { text-shadow: 0 0 10px rgba(96,160,255,0.5); transform: none; }
    95% { text-shadow: -2px 0 var(--red), 2px 0 var(--green); transform: skew(-1deg); }
    96% { text-shadow: 2px 0 var(--red), -2px 0 var(--green); transform: skew(1deg); }
    97% { text-shadow: 0 0 10px rgba(96,160,255,0.5); transform: none; }
  }

  .ticker-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 12px; scrollbar-width: none;
  }
  .ticker-scroll::-webkit-scrollbar { display: none; }
  .ticker-btn {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif; white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden;
  }
  .ticker-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.05));
    opacity: 0; transition: opacity 0.3s;
  }
  .ticker-btn:hover::before { opacity: 1; }
  .ticker-btn:hover { transform: translateY(-2px); border-color: var(--muted); color: var(--text); }
  .ticker-btn:active { transform: scale(0.95); }
  .ticker-btn.active {
    border-color: var(--blue);
    background: rgba(96,160,255,0.15);
    color: var(--blue);
    box-shadow: 0 0 12px rgba(96,160,255,0.3);
    animation: activePulse 2s ease infinite;
  }
  @keyframes activePulse {
    0%,100% { box-shadow: 0 0 12px rgba(96,160,255,0.3); }
    50%      { box-shadow: 0 0 20px rgba(96,160,255,0.6); }
  }

  .content { padding: 0 16px; position: relative; z-index: 1; }

  /* ── PRICE CARD ── */
  .price-card {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border); border-radius: 16px;
    padding: 20px; margin: 12px 0;
    position: relative; overflow: hidden;
    animation: slideDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .price-card::before {
    content: ''; position: absolute;
    top: -50%; right: -30%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(96,160,255,0.06), transparent 70%);
    pointer-events: none;
  }
  /* corner decoration */
  .price-card::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    animation: scanLine 3s ease-in-out infinite;
  }
  @keyframes scanLine {
    0%,100% { opacity: 0.3; } 50% { opacity: 1; }
  }

  .price-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .stock-name { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  .price-main {
    font-family: 'Space Mono', monospace;
    font-size: 34px; font-weight: 700; letter-spacing: -1px;
    transition: all 0.4s;
  }
  .price-main.flash-up   { animation: flashUp 0.6s ease; }
  .price-main.flash-down { animation: flashDown 0.6s ease; }
  @keyframes flashUp {
    0%,100% { color: var(--text); }
    30%     { color: var(--green); text-shadow: 0 0 20px var(--green); }
  }
  @keyframes flashDown {
    0%,100% { color: var(--text); }
    30%     { color: var(--red); text-shadow: 0 0 20px var(--red); }
  }

  .price-change {
    font-size: 14px; margin-top: 4px;
    animation: fadeInUp 0.4s ease 0.1s both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SIGNAL BADGE ── */
  .signal-badge {
    border-radius: 12px; padding: 10px 16px;
    text-align: center; min-width: 90px;
    transition: all 0.4s;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  .signal-badge.buy   { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both, buyGlow 2s ease infinite 0.7s; }
  .signal-badge.sell  { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both, sellGlow 2s ease infinite 0.7s; }
  .signal-badge.hold  { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both, holdGlow 2s ease infinite 0.7s; }
  @keyframes buyGlow  { 0%,100%{box-shadow:0 0 8px rgba(0,212,160,0.3);}  50%{box-shadow:0 0 20px rgba(0,212,160,0.7);} }
  @keyframes sellGlow { 0%,100%{box-shadow:0 0 8px rgba(255,77,109,0.3);} 50%{box-shadow:0 0 20px rgba(255,77,109,0.7);} }
  @keyframes holdGlow { 0%,100%{box-shadow:0 0 8px rgba(240,192,64,0.3);} 50%{box-shadow:0 0 20px rgba(240,192,64,0.7);} }

  .signal-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 4px; }
  .signal-value { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

  /* ── MINI STATS ── */
  .mini-stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 8px; margin-top: 16px;
  }
  .mini-stat {
    background: rgba(255,255,255,0.03); border-radius: 8px;
    padding: 8px 10px; text-align: center;
    transition: all 0.3s;
    animation: fadeInUp 0.4s ease both;
  }
  .mini-stat:nth-child(1) { animation-delay: 0.1s; }
  .mini-stat:nth-child(2) { animation-delay: 0.2s; }
  .mini-stat:nth-child(3) { animation-delay: 0.3s; }
  .mini-stat:hover {
    background: rgba(96,160,255,0.08);
    transform: translateY(-2px);
    border: 1px solid rgba(96,160,255,0.2);
  }
  .mini-stat-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 3px; }
  .mini-stat-value { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }

  /* ── SIGNAL CARD ── */
  .signal-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; margin-bottom: 12px;
    animation: slideIn 0.5s ease 0.15s both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .card-title { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .reason-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; font-size: 12px; border-radius: 6px;
    margin-bottom: 2px; transition: background 0.2s;
    animation: fadeInUp 0.3s ease both;
  }
  .reason-row:hover { background: rgba(255,255,255,0.04); }
  .reason-row:nth-child(2) { animation-delay: 0.05s; }
  .reason-row:nth-child(3) { animation-delay: 0.10s; }
  .reason-row:nth-child(4) { animation-delay: 0.15s; }
  .reason-row:nth-child(5) { animation-delay: 0.20s; }

  /* ── TABS ── */
  .tabs {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 4px; background: var(--bg2); border-radius: 12px;
    padding: 4px; margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    padding: 8px 4px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted);
    font-size: 11px; font-family: inherit; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .tab-btn:active { transform: scale(0.95); }
  .tab-btn.active {
    background: var(--border); color: var(--blue);
    box-shadow: 0 2px 8px rgba(96,160,255,0.2);
  }

  /* ── CHART CARD ── */
  .chart-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 12px; margin-bottom: 12px;
    transition: box-shadow 0.3s;
    animation: fadeInUp 0.5s ease 0.2s both;
  }
  .chart-card:hover { box-shadow: 0 4px 24px rgba(96,160,255,0.08); }
  .chart-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  canvas { max-height: 220px; }

  /* ── PERIOD BUTTONS ── */
  .period-btns { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .period-btn {
    padding: 5px 12px; border-radius: 8px; border: none;
    background: var(--bg3); color: var(--muted);
    font-size: 11px; font-family: inherit; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden;
  }
  .period-btn::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(96,160,255,0.3), transparent);
    opacity: 0; transition: opacity 0.4s;
  }
  .period-btn:hover::after { opacity: 1; }
  .period-btn:hover { transform: translateY(-2px); color: var(--text); }
  .period-btn:active { transform: scale(0.95); }
  .period-btn.active {
    background: rgba(96,160,255,0.2); color: var(--blue);
    box-shadow: 0 0 10px rgba(96,160,255,0.2);
  }

  /* ── PRED BUTTONS ── */
  .pred-btns { display: flex; gap: 6px; margin-bottom: 10px; }
  .pred-btn {
    padding: 4px 10px; border-radius: 8px; border: none;
    background: var(--bg3); color: var(--muted);
    font-size: 11px; font-family: inherit; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .pred-btn:hover { transform: translateY(-1px); color: var(--text); }
  .pred-btn:active { transform: scale(0.95); }
  .pred-btn.active { background: rgba(240,192,64,0.2); color: var(--yellow); box-shadow: 0 0 8px rgba(240,192,64,0.2); }

  /* ── FORECAST BOX ── */
  .forecast-box {
    border-radius: 10px; padding: 12px 14px; margin-top: 10px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .forecast-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .forecast-price { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .forecast-trend { font-size: 12px; margin-top: 2px; }

  /* ── TICKER TAPE ── */
  .ticker-tape-wrap {
    overflow: hidden; background: rgba(30,58,95,0.3);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 5px 0; margin-bottom: 12px; white-space: nowrap;
  }
  .ticker-tape {
    display: inline-block;
    animation: tickerMove 25s linear infinite;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px;
  }
  @keyframes tickerMove { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

  /* ── PRICE COUNTER ANIMATION ── */
  @keyframes countUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── NUMBER TICKER ── */
  .num-tick { display: inline-block; transition: all 0.4s; }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 40px; color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 8px rgba(96,160,255,0.3);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LIVE DOT ── */
  .live-dot {
    display: inline-block; width: 7px; height: 7px;
    background: var(--green); border-radius: 50%;
    animation: livePulse 1.5s ease-in-out infinite;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--green);
  }
  @keyframes livePulse {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px var(--green); }
    50%      { opacity: 0.4; transform: scale(0.7); box-shadow: none; }
  }

  /* ── RIPPLE BUTTON ── */
  .refresh-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--blue); padding: 4px 10px; border-radius: 8px;
    font-size: 11px; cursor: pointer; font-family: inherit;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .refresh-btn:hover { background: rgba(96,160,255,0.1); box-shadow: 0 0 10px rgba(96,160,255,0.2); transform: translateY(-1px); }
  .refresh-btn:active { transform: scale(0.95); }

  /* ── PARTICLE BURST ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 6px; height: 6px; border-radius: 50%;
    animation: burst 0.8s ease-out forwards;
  }
  @keyframes burst {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── VOLUME BARS ── */
  .vol-bar-container { margin-top: 8px; }
  .vol-bar-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10px; }
  .vol-bar-bg { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .vol-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

  /* ── TOOLTIP GLOW ── */
  .up   { color: var(--green); }
  .down { color: var(--red); }

  /* ── REFRESH BAR ── */
  .refresh-bar {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--muted); margin-bottom: 0;
    padding: 8px 0;
  }

  /* ── ERROR ── */
  .error-box {
    background: rgba(255,77,109,0.1); border: 1px solid var(--red);
    border-radius: 12px; padding: 16px; text-align: center;
    font-size: 13px; color: var(--red); margin: 12px 0;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  .disclaimer { text-align: center; font-size: 10px; color: #3a4a63; margin-top: 16px; padding: 0 16px; }

  /* ── PROGRESS BAR (auto-refresh) ── */
  #refreshProgress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--green));
    z-index: 9999; transition: width 1s linear;
    box-shadow: 0 0 6px var(--blue);
  }
</style>
</head>
<body>

<!-- Auto-refresh progress bar -->
<div id="refreshProgress" style="width:0%"></div>

<!-- Starfield -->
<div id="stars"></div>

<header>
  <div class="header-title">📈 AI STOCK DASHBOARD — REAL-TIME สร้างขึ้นโดย ซันดาวเนอร์</div>
  <div class="ticker-scroll" id="tickerRow"></div>
</header>

<div class="content">
  <div class="refresh-bar">
    <span><span class="live-dot"></span><span id="lastUpdate">กำลังโหลด...</span></span>
    <button class="refresh-btn" onclick="fetchData()">🔄 รีเฟรช</button>
  </div>

  <!-- Ticker Tape -->
  <div class="ticker-tape-wrap">
    <span class="ticker-tape" id="tickerTape">AAPL · GOOGL · MSFT · TSLA · NVDA · AMZN · META &nbsp;&nbsp;&nbsp;</span>
  </div>

  <div id="mainContent">
    <div class="loading"><div class="spinner"></div> กำลังดึงข้อมูลจริง...</div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// ORIGINAL CONFIG (คงเดิม)
// ════════════════════════════════════════
const STOCKS = {
  AAPL:  { name:"Apple",     emoji:"🍎" },
  GOOGL: { name:"Google",    emoji:"🔍" },
  MSFT:  { name:"Microsoft", emoji:"🖥️" },
  TSLA:  { name:"Tesla",     emoji:"⚡" },
  NVDA:  { name:"NVIDIA",    emoji:"🤖" },
  AMZN:  { name:"Amazon",    emoji:"📦" },
  META:  { name:"Meta",      emoji:"📱" },
};

let currentTicker = "AAPL";
let currentPeriod = "3mo";
let currentTab    = "chart";
let currentPred   = 7;
let chartInstance = null;
let allData       = [];
let autoRefresh   = null;

// ════════════════════════════════════════
// ✨ LÜÜKเล่น: STARFIELD
// ════════════════════════════════════════
function initStars() {
  const container = document.getElementById("stars");
  for (let i = 0; i < 60; i++) {
    const star = document.createElement("div");
    star.className = "star";
    const size = Math.random() * 2 + 0.5;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${Math.random()*4+2}s;
      animation-delay:${Math.random()*5}s;
      opacity:${Math.random()*0.6+0.1};
    `;
    container.appendChild(star);
  }
}

// ════════════════════════════════════════
// ✨ LÜÜKเล่น: PARTICLE BURST on ticker click
// ════════════════════════════════════════
function spawnParticles(x, y, color) {
  const colors = [color || "#60a0ff", "#00d4a0", "#f0c040", "#a070ff", "#ff4d6d"];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const angle = (i / 10) * Math.PI * 2;
    const dist  = 40 + Math.random() * 30;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colors[i % colors.length]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-duration:${0.5+Math.random()*0.4}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// ════════════════════════════════════════
// ✨ LÜÜKเล่น: ANIMATED NUMBER COUNTER
// ════════════════════════════════════════
function animateNumber(el, from, to, prefix="$", duration=600) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const val = from + (to - from) * ease;
    el.textContent = prefix + val.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ════════════════════════════════════════
// ✨ LÜÜKเล่น: AUTO-REFRESH PROGRESS BAR
// ════════════════════════════════════════
let progressInterval = null;
let progressValue = 0;
function startProgress() {
  clearInterval(progressInterval);
  progressValue = 0;
  const bar = document.getElementById("refreshProgress");
  bar.style.width = "0%";
  progressInterval = setInterval(() => {
    progressValue += 100 / 60;
    bar.style.width = Math.min(progressValue, 98) + "%";
    if (progressValue >= 100) clearInterval(progressInterval);
  }, 1000);
}
function completeProgress() {
  const bar = document.getElementById("refreshProgress");
  bar.style.width = "100%";
  setTimeout(() => { bar.style.width = "0%"; progressValue = 0; }, 400);
}

function updateTickerTape(price, change, pct, isUp) {

}

// ORIGINAL: Fetch data (+ ลูกเล่น progress)
// ════════════════════════════════════════
async function fetchData() {
  startProgress(); // ✨
  document.getElementById("mainContent").innerHTML =
    `<div class="loading"><div class="spinner"></div> กำลังดึงข้อมูล ${currentTicker}...</div>`;

  const interval = currentPeriod === "1d" ? "5m" : currentPeriod === "5d" ? "15m" : "1d";
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${currentTicker}?range=${currentPeriod}&interval=${interval}&includePrePost=false`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

  try {
    const res  = await fetch(proxy, { signal: AbortSignal.timeout(15000) });
    const json = await res.json();
    const raw  = JSON.parse(json.contents);

    const result = raw?.chart?.result?.[0];
    if (!result) throw new Error("ไม่พบข้อมูล");

    const timestamps = result.timestamp;
    const q = result.indicators.quote[0];
    const meta = result.meta;

    allData = timestamps.map((ts, i) => ({
      date:   new Date(ts * 1000).toLocaleDateString("th-TH", { month:"short", day:"numeric" }),
      close:  q.close[i]  ? parseFloat(q.close[i].toFixed(2))  : null,
      open:   q.open[i]   ? parseFloat(q.open[i].toFixed(2))   : null,
      high:   q.high[i]   ? parseFloat(q.high[i].toFixed(2))   : null,
      low:    q.low[i]    ? parseFloat(q.low[i].toFixed(2))    : null,
      volume: q.volume[i] || 0,
    })).filter(d => d.close !== null);

    allData = calcIndicators(allData);

    const price    = meta.regularMarketPrice || allData[allData.length-1].close;
    const prevClose= meta.chartPreviousClose  || allData[allData.length-2]?.close || price;
    const change   = price - prevClose;
    const changePct= (change / prevClose * 100).toFixed(2);
    const isUp     = change >= 0;
    const high52   = meta.fiftyTwoWeekHigh || Math.max(...allData.map(d=>d.high||0));
    const low52    = meta.fiftyTwoWeekLow  || Math.min(...allData.map(d=>d.low||999999));
    const latest   = allData[allData.length - 1];
    const signal   = getSignal(allData);
    const preds    = mlPredict(allData, currentPred);

    document.getElementById("lastUpdate").textContent =
      `อัปเดต: ${new Date().toLocaleTimeString("th-TH")}`;

    completeProgress(); // ✨
    updateTickerTape(price, change, changePct, isUp); // ✨
    renderUI({ price, change, changePct, isUp, high52, low52, latest, signal, preds, meta });

  } catch (err) {
    completeProgress(); // ✨
    console.error(err);
    document.getElementById("mainContent").innerHTML = `
      <div class="error-box">
        ❌ ดึงข้อมูลไม่ได้<br>
        <small style="color:var(--muted);font-size:11px">${err.message}</small><br><br>
        <button class="refresh-btn" onclick="fetchData()">ลองใหม่</button>
      </div>`;
  }
}

// ════════════════════════════════════════
// ORIGINAL: Indicators (คงเดิม)
// ════════════════════════════════════════
function calcIndicators(data) {
  return data.map((d, i, arr) => {
    let rsi = 50;
    if (i >= 14) {
      const diffs = arr.slice(i-13, i+1).map((x,j,a) => j===0 ? 0 : x.close - a[j-1].close);
      const gains  = diffs.filter(v=>v>0).reduce((s,v)=>s+v,0)/14;
      const losses = diffs.filter(v=>v<0).reduce((s,v)=>s+Math.abs(v),0)/14;
      rsi = losses===0 ? 100 : parseFloat((100 - 100/(1+gains/losses)).toFixed(1));
    }
    const ma20 = i>=19 ? parseFloat((arr.slice(i-19,i+1).reduce((s,x)=>s+x.close,0)/20).toFixed(2)) : null;
    const ma50 = i>=49 ? parseFloat((arr.slice(i-49,i+1).reduce((s,x)=>s+x.close,0)/50).toFixed(2)) : null;
    const ema = (span, idx) => {
      const k = 2/(span+1); let e = arr[0].close;
      for(let j=1;j<=idx;j++) e = arr[j].close*k + e*(1-k);
      return e;
    };
    const macd    = i>=26 ? parseFloat((ema(12,i)-ema(26,i)).toFixed(3)) : 0;
    const macdSig = i>=35 ? parseFloat((ema(9,i)*0.3).toFixed(3)) : 0;
    return { ...d, rsi, ma20, ma50, macd, macdSignal: macdSig };
  });
}

// ORIGINAL: Signal (คงเดิม)
function getSignal(data) {
  const l = data[data.length-1], p = data[data.length-2];
  let score = 0; const reasons = [];
  if (l.rsi < 30)      { score+=2; reasons.push({icon:"🟢", text:`RSI ${l.rsi} — Oversold (ซื้อมากไป)`}); }
  else if (l.rsi > 70) { score-=2; reasons.push({icon:"🔴", text:`RSI ${l.rsi} — Overbought (ขายมากไป)`}); }
  else                  { reasons.push({icon:"🟡", text:`RSI ${l.rsi} — Neutral`}); }
  if (l.macd > l.macdSignal) { score+=1; reasons.push({icon:"🟢", text:"MACD Bullish Cross"}); }
  else                        { score-=1; reasons.push({icon:"🔴", text:"MACD Bearish Cross"}); }
  if (l.ma20 && l.ma50) {
    if (l.close>l.ma20 && l.ma20>l.ma50)      { score+=2; reasons.push({icon:"🟢", text:"ราคา > MA20 > MA50 Uptrend"}); }
    else if (l.close<l.ma20 && l.ma20<l.ma50) { score-=2; reasons.push({icon:"🔴", text:"ราคา < MA20 < MA50 Downtrend"}); }
    else reasons.push({icon:"🟡", text:"MA Mixed"});
  }
  if (l.close > p.close) { score+=1; reasons.push({icon:"🟢", text:"ราคาวันนี้สูงกว่าเมื่อวาน"}); }
  else                    { score-=1; reasons.push({icon:"🔴", text:"ราคาวันนี้ต่ำกว่าเมื่อวาน"}); }
  if (score>=3) return { label:"BUY 🚀",  color:"#00d4a0", bg:"rgba(0,212,160,0.12)",  border:"#00d4a0", reasons, cls:"buy" };
  if (score<=-3) return { label:"SELL 📉", color:"#ff4d6d", bg:"rgba(255,77,109,0.12)", border:"#ff4d6d", reasons, cls:"sell" };
  return { label:"HOLD ⏸", color:"#f0c040", bg:"rgba(240,192,64,0.12)", border:"#f0c040", reasons, cls:"hold" };
}

// ORIGINAL: ML Predict (คงเดิม)
function mlPredict(data, days=7) {
  const closes = data.map(d=>d.close);
  const n = closes.length;
  const mx = (n-1)/2;
  const my = closes.reduce((a,b)=>a+b,0)/n;
  const num = closes.reduce((s,y,i)=>s+(i-mx)*(y-my),0);
  const den = closes.reduce((s,_,i)=>s+(i-mx)**2,0);
  const slope = num/den, intercept = my-slope*mx;
  const preds = [];
  for(let i=1;i<=days;i++) preds.push({ predicted: parseFloat((slope*(n+i-1)+intercept).toFixed(2)) });
  return preds;
}

    chartInstance = new Chart(ctx, {
      type:"line",
      data:{
        labels:slice.map(d=>d.date),
        datasets:[{label:"RSI", data:slice.map(d=>d.rsi), borderColor:"#a070ff", backgroundColor:"rgba(160,112,255,0.1)", fill:true, borderWidth:2, pointRadius:0, tension:0.3}]
      },
      options:{...chartOpts(""), scales:{x:{grid:{color:"#1a2235"},ticks:{maxTicksLimit:6}}, y:{min:0,max:100,grid:{color:"#1a2235"}}}}

// ORIGINAL: chartOpts (คงเดิม)
function chartOpts(prefix="$") {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:"index", intersect:false},
    plugins:{
      legend:{labels:{boxWidth:12, font:{size:10}}},
      tooltip:{
        backgroundColor:"#111827", borderColor:"#1e3a5f", borderWidth:1,
        callbacks:{label: ctx => ` ${ctx.dataset.label}: ${prefix}${ctx.parsed.y?.toFixed(2)??ctx.parsed.y}`}
      }
    },
    scales:{
      x:{grid:{color:"#1a2235"}, ticks:{maxTicksLimit:6, font:{size:9}}},
      y:{grid:{color:"#1a2235"}, ticks:{font:{size:9}, callback: v=>`${prefix}${v.toFixed(0)}`}}
    }
  };
}
